name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review (for manual testing)'
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    # Skip draft PRs; always allow manual dispatch
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout repository with full history so we can compute the diff
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------------
      # 2. For manual dispatch, checkout the PR branch so HEAD points to it
      #    SECURITY: pr_number is passed via env to avoid shell injection.
      # ------------------------------------------------------------------
      - name: Checkout PR branch (manual dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number != ''
        run: |
          set -euo pipefail
          gh pr checkout "$PR_NUMBER"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}

      # ------------------------------------------------------------------
      # 3. Resolve PR number and base ref (used by both triggers)
      #    SECURITY: All dynamic values are passed via env vars.
      # ------------------------------------------------------------------
      - name: Resolve PR context
        id: pr-context
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          else
            if [ -z "$INPUT_PR_NUMBER" ]; then
              echo "Error: workflow_dispatch requires a pr_number input." >&2
              exit 1
            fi
            BASE_REF=$(gh pr view "$INPUT_PR_NUMBER" --json baseRefName -q .baseRefName)
            echo "pr_number=$INPUT_PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number }}
          BASE_REF: ${{ github.base_ref }}

      # ------------------------------------------------------------------
      # 4. Generate diff between base branch and PR HEAD
      #    Excludes common generated directories to keep size down.
      #    SECURITY: base_ref is passed via env to avoid shell injection.
      # ------------------------------------------------------------------
      - name: Generate diff
        id: diff
        run: |
          set -euo pipefail
          git fetch origin "$BASE_REF"

          # Do not mask errors with || true; let set -e catch real failures.
          git diff "origin/${BASE_REF}...HEAD" -- . \
            ':!node_modules' \
            ':!vendor' \
            ':!*.lock' > pr_diff.txt

          DIFF_SIZE=$(wc -c < pr_diff.txt)
          echo "diff_size=$DIFF_SIZE" >> "$GITHUB_OUTPUT"
          echo "Diff size: $DIFF_SIZE bytes"
        env:
          BASE_REF: ${{ steps.pr-context.outputs.base_ref }}

      # ------------------------------------------------------------------
      # 5. Cost control: skip review if diff exceeds safe token limit
      #    ~50K tokens ≈ 200K bytes (4 chars/token). We cap at 150K bytes
      #    to leave headroom for the system prompt and model response.
      #    Also detects empty diffs to avoid wasteful API calls.
      # ------------------------------------------------------------------
      - name: Check diff size limit
        id: size-check
        run: |
          set -euo pipefail
          MAX_SIZE=150000
          SIZE="$DIFF_SIZE"
          if [ "$SIZE" -eq 0 ]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
            echo "No reviewable changes found."
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "$SIZE" -gt "$MAX_SIZE" ]; then
            echo "too_large=true" >> "$GITHUB_OUTPUT"
            echo "Diff too large ($SIZE bytes > $MAX_SIZE bytes). Skipping AI review."
          else
            echo "too_large=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          DIFF_SIZE: ${{ steps.diff.outputs.diff_size }}

      # ------------------------------------------------------------------
      # 5b. Notify PR when diff is empty (no reviewable changes)
      # ------------------------------------------------------------------
      - name: Post skip comment (no changes)
        if: steps.size-check.outputs.empty == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ steps.pr-context.outputs.pr_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "## 🤖 AI Code Review\n\nNo reviewable changes found."
            })

      # ------------------------------------------------------------------
      # 6. Notify PR when diff is too large
      # ------------------------------------------------------------------
      - name: Post skip comment (diff too large)
        if: steps.size-check.outputs.too_large == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ steps.pr-context.outputs.pr_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "## 🤖 AI Code Review\n\nThe diff exceeds the safe size limit (~50K tokens). Skipping automated review to avoid token overflow and excessive cost. Consider splitting large PRs into smaller chunks."
            })

      # ------------------------------------------------------------------
      # 7. Call OpenRouter LLM with the diff
      #    SECURITY: The API key is passed via env var and never logged.
      # ------------------------------------------------------------------
      - name: Call OpenRouter for review
        id: openrouter
        if: steps.size-check.outputs.too_large == 'false' && steps.size-check.outputs.empty == 'false'
        run: |
          set -euo pipefail

          DIFF_CONTENT=$(cat pr_diff.txt)

          # Build JSON payload safely with jq (handles escaping automatically)
          jq -n \
            --arg diff "$DIFF_CONTENT" \
            '{
              model: "qwen/qwen-2.5-coder-32b-instruct",
              messages: [
                {
                  role: "system",
                  content: "You are a senior code reviewer performing a structured review of a git diff.\n\nFormat your response exactly with these markdown sections:\n\n## Critical Issues\nList bugs, security vulnerabilities, or breaking changes. Be specific about files and line numbers if visible in the diff. If none, state \"None found.\"\n\n## Warnings\nList potential issues, anti-patterns, or risks. If none, state \"None found.\"\n\n## Suggestions\nList improvements for readability, performance, maintainability, or best practices. If none, state \"None found.\"\n\n## Looks Good\nList anything done well in this PR.\n\nBe concise. Use bullet points. Do not hallucinate issues that are not supported by the diff. If the PR is small and correct, say so."
                },
                {
                  role: "user",
                  content: ("Please review the following git diff:\n\n```diff\n" + $diff + "\n```")
                }
              ]
            }' > payload.json

          RESPONSE_FILE=$(mktemp)
          # Timeouts prevent hanging if OpenRouter is unreachable.
          HTTP_CODE=$(curl --max-time 120 --connect-timeout 30 -s -o "$RESPONSE_FILE" -w "%{http_code}" \
            https://openrouter.ai/api/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "HTTP-Referer: https://github.com/${REPOSITORY}" \
            -H "X-Title: AI Code Review" \
            -d @payload.json)

          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "OpenRouter API call failed (HTTP $HTTP_CODE)" >&2
            # Only emit safe error fields to avoid leaking secrets in logs.
            jq -r '.error.message // "Unknown error"' "$RESPONSE_FILE" >&2
            rm -f "$RESPONSE_FILE"
            exit 1
          fi

          # Validate response shape before writing to file.
          if ! jq -er '.choices[0].message.content' "$RESPONSE_FILE" > review.md; then
            echo "Invalid API response: missing choices[0].message.content" >&2
            rm -f "$RESPONSE_FILE"
            exit 1
          fi
          rm -f "$RESPONSE_FILE"
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          REPOSITORY: ${{ github.repository }}

      # ------------------------------------------------------------------
      # 8. Post the structured review as a PR comment
      #    Note: steps.openrouter.outcome check is unnecessary here;
      #    this step only runs when the openrouter step succeeded.
      # ------------------------------------------------------------------
      - name: Post AI review comment
        if: steps.size-check.outputs.too_large == 'false' && steps.size-check.outputs.empty == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.md', 'utf8');
            const body = "## 🤖 AI Code Review (OpenRouter: qwen/qwen-2.5-coder-32b-instruct)\n\n" + review;
            github.rest.issues.createComment({
              issue_number: ${{ steps.pr-context.outputs.pr_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      # ------------------------------------------------------------------
      # 9. If the API call failed, post a polite failure notice so the
      #    PR author knows the review was attempted.
      # ------------------------------------------------------------------
      - name: Post failure comment (API error)
        if: failure() && steps.openrouter.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: ${{ steps.pr-context.outputs.pr_number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "## 🤖 AI Code Review\n\nSorry, the AI review failed due to an API error. Please check the workflow logs for details."
            })
